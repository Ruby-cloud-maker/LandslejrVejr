<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Det gode Landslejrvejr</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sky: #5BA8E0; --sky-light: #EAF4FC;
    --sun: #F5A623; --sun-dark: #C47D0A;
    --green: #4A9B6F; --green-light: #E8F5EE;
    --text: #1A2B3C; --text-muted: #5A7080;
    --card-bg: rgba(255,255,255,0.85);
    --card-border: rgba(91,168,224,0.25);
    --radius: 16px; --radius-sm: 10px;
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(160deg, #C8E8F7 0%, #E8F5EE 50%, #FFF8E7 100%);
    min-height: 100vh; color: var(--text); padding: 2rem 1rem 4rem;
  }
  header { text-align: center; margin-bottom: 2rem; }
  .sted-badge {
    display: inline-block; font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--sky);
    background: rgba(91,168,224,0.12); border-radius: 99px;
    padding: 4px 14px; margin-bottom: 0.75rem;
  }
  h1 { font-size: clamp(26px,5vw,42px); font-weight: 700; color: var(--text); line-height: 1.15; margin-bottom: 0.4rem; }
  h1 span { color: var(--sun-dark); }
  .undertitel { font-size: 15px; color: var(--text-muted); margin-bottom: 1.5rem; }
  #gen-btn {
    background: var(--sun); color: #fff; font-size: 15px; font-weight: 600;
    border: none; border-radius: 99px; padding: 0.65rem 1.75rem; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 12px rgba(245,166,35,0.35);
  }
  #gen-btn:hover { background: var(--sun-dark); transform: translateY(-1px); }
  #gen-btn:active { transform: scale(0.97); }

  #detail-panel {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 1.25rem 1.5rem;
    margin: 1.5rem auto; max-width: 680px; display: none;
    backdrop-filter: blur(6px); animation: slideDown 0.2s ease;
  }
  #detail-panel.aktiv { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .detail-top { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 0.75rem; }
  .detail-ikon { font-size: 44px; line-height: 1; }
  .detail-titel { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .detail-temp { font-size: 14px; color: var(--text-muted); }
  .detail-tekst { font-size: 15px; color: var(--text-muted); line-height: 1.7; margin-bottom: 0.75rem; }
  .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .badge {
    font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 99px;
    background: var(--sky-light); color: var(--sky); border: 1px solid rgba(91,168,224,0.25);
  }
  .luk-btn { background: none; border: none; font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 0; }
  .luk-btn:hover { color: var(--text); }

  .dag-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px; max-width: 900px; margin: 0 auto;
  }
  .dag-kort {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius-sm); padding: 1rem 0.75rem; text-align: center;
    cursor: pointer; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    backdrop-filter: blur(4px); position: relative;
  }
  .dag-kort:hover { transform: translateY(-3px); border-color: var(--sky); box-shadow: 0 6px 20px rgba(91,168,224,0.2); }
  .dag-kort:active { transform: scale(0.97); }
  .dag-kort.valgt { border-color: var(--sun); box-shadow: 0 6px 20px rgba(245,166,35,0.25); }

  /* Hemmelig spil-styling */
  .dag-kort.spil-valgt {
    border-color: var(--sun) !important;
    background: rgba(255,248,225,0.97) !important;
    box-shadow: 0 0 0 3px rgba(245,166,35,0.5) !important;
    transform: translateY(-2px);
  }
  .dag-kort.spil-valgt .dag-ikon { animation: bounce 0.4s ease; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

  .spil-tæller {
    display: none; text-align: center; margin: 1rem auto 0;
    font-size: 13px; color: var(--text-muted);
  }
  .spil-tæller.vis { display: block; }
  .spil-prik { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ddd; margin: 0 3px; transition: background 0.2s; }
  .spil-prik.aktiv { background: var(--sun); }

  /* Achievement overlay */
  #achievement {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(20,40,60,0.6); z-index: 999;
    align-items: center; justify-content: center;
  }
  #achievement.vis { display: flex; }
  .achievement-box {
    background: #fff; border-radius: 24px; padding: 2.5rem 2rem;
    text-align: center; max-width: 360px; width: 90%;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { opacity:0; transform: scale(0.7); } to { opacity:1; transform: scale(1); } }
  .achievement-ikon { font-size: 64px; margin-bottom: 0.5rem; line-height: 1; }
  .achievement-titel { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
  .achievement-tekst { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.25rem; }
  .achievement-luk {
    background: var(--sun); color: #fff; border: none; border-radius: 99px;
    font-size: 15px; font-weight: 600; padding: 0.6rem 1.75rem; cursor: pointer;
  }
  .achievement-luk:hover { background: var(--sun-dark); }

  /* Konfetti canvas */
  #konfetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 998; }

  .hint { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 1.25rem; }
  .ach-tæller {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(91,168,224,0.2);
    border-radius: 99px; padding: 3px 10px 3px 8px;
    margin-top: 0.75rem; cursor: default;
    transition: opacity 0.3s;
  }
  .ach-tæller-ikon { font-size: 13px; }
  .ach-tæller.ny { animation: achPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes achPop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }
  footer { text-align: center; margin-top: 3rem; font-size: 12px; color: var(--text-muted); opacity: 0.7; }
  #fdf-reset {
    background: none; border: none; cursor: pointer;
    font-size: inherit; color: inherit; padding: 0;
    font-family: inherit; opacity: 0.5;
    transition: opacity 0.2s, letter-spacing 0.3s;
  }
  #fdf-reset:hover { opacity: 1; letter-spacing: 0.06em; }
  #fdf-reset.aktiveret { color: #e05050; opacity: 1; }
  #reset-confirm {
    display: none; font-size: 11px; color: #e05050;
    margin-top: 4px; cursor: pointer;
  }
  #reset-confirm.vis { display: block; }
  @media (max-width: 500px) {
    .dag-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
    .dag-ikon { font-size: 28px; } .dag-temp { font-size: 18px; }
  }
  .dag-navn { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.03em; }
  .dag-ikon { font-size: 34px; display: block; margin-bottom: 6px; }
  .dag-vejr { font-size: 12px; color: var(--text-muted); line-height: 1.3; margin-bottom: 6px; min-height: 30px; }
  .dag-temp { font-size: 22px; font-weight: 700; color: var(--text); }
</style>
</head>
<body>

<canvas id="konfetti-canvas"></canvas>

<div id="achievement">
  <div class="achievement-box">
    <div class="achievement-ikon" id="ach-ikon"></div>
    <div class="achievement-titel" id="ach-titel"></div>
    <p class="achievement-tekst" id="ach-tekst"></p>
    <button class="achievement-luk" onclick="lukAchievement()">Fedt! 🎉</button>
  </div>
</div>

<header>
  <div class="sted-badge">📍 Ry-området · FDF Landslejr 2025</div>

<div id="detail-panel"></div>

<div class="spil-tæller" id="spil-tæller"></div>

<footer>
  Det gode Landslejrvejr · <button id="fdf-reset" onclick="fdfKlik()">FDF</button> · Regnvejr er ikke en option
  <div id="reset-confirm" onclick="resetAchievements()">↺ Nulstil achievements?</div>
</footer>

const dageNavn = ["Tirs 8/7","Ons 9/7","Tors 10/7","Fre 11/7","Lør 12/7","Søn 13/7","Man 14/7","Tirs 15/7","Ons 16/7","Tors 17/7","Fre 18/7","Lør 19/7"];

let dagData = [];
let valgtIdx = null;
let spilValgte = [];
let spilAktiv = false;

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function genererVejr() {
  const shuffled = [...vejrTyper].sort(() => Math.random() - 0.5);
  const pulje = shuffled.slice(0, 8);
  dagData = dageNavn.map(navn => ({
    navn,
    vejr: pulje[Math.floor(Math.random() * pulje.length)],
    temp: rand(21, 28)
  }));
  valgtIdx = null;
  spilValgte = [];
  spilAktiv = false;
  document.getElementById("detail-panel").classList.remove("aktiv");
  document.getElementById("spil-tæller").classList.remove("vis");

  // Find om der findes mindst ét ikon med 3+ forekomster
  const tæl = {};
  dagData.forEach(d => { tæl[d.vejr.ikon] = (tæl[d.vejr.ikon] || 0) + 1; });
  spilAktiv = Object.values(tæl).some(v => v >= 3);

  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById("dag-grid");
  grid.innerHTML = "";
  dagData.forEach((dag, i) => {
    const erSpilValgt = spilValgte.includes(i);
    let cls = "dag-kort";
    if (valgtIdx === i) cls += " valgt";
    if (erSpilValgt) cls += " spil-valgt";

    const kort = document.createElement("div");
    kort.className = cls;
    kort.innerHTML = `
      <div class="dag-navn">${dag.navn}</div>
      <span class="dag-ikon">${dag.vejr.ikon}</span>
      <div class="dag-vejr">${dag.vejr.label}</div>
      <div class="dag-temp">${dag.temp}°C</div>
    `;
    kort.addEventListener("click", () => klikDag(i));
    grid.appendChild(kort);
  });

  // Opdater spil-tæller
  if (spilValgte.length > 0) {
    const tæller = document.getElementById("spil-tæller");
    tæller.classList.add("vis");
    const prikker = [0,1,2].map(n =>
      `<span class="spil-prik ${n < spilValgte.length ? 'aktiv' : ''}"></span>`
    ).join("");
    tæller.innerHTML = prikker;
  }
}

function klikDag(i) {
  const dag = dagData[i];

  // Spil-logik: hvis samme ikon som det første valgte (eller første klik)
  if (spilValgte.length === 0) {
    // Første klik starter spillet kun hvis dette ikon optræder 3+ gange
    const tæl = dagData.filter(d => d.vejr.ikon === dag.vejr.ikon).length;
    if (tæl >= 3) {
      spilValgte = [i];
      valgtIdx = null;
      document.getElementById("detail-panel").classList.remove("aktiv");
      renderGrid();
      return;
    }
  } else if (spilValgte.length === 1 || spilValgte.length === 2) {
    const første = dagData[spilValgte[0]].vejr.ikon;
    if (dag.vejr.ikon === første && !spilValgte.includes(i)) {
      spilValgte.push(i);
      renderGrid();
      if (spilValgte.length === 3) {
        setTimeout(visAchievement, 400);
      }
      return;
    } else if (dag.vejr.ikon !== første) {
      // Forkert ikon – nulstil spil, vis normal detalje
      spilValgte = [];
      document.getElementById("spil-tæller").classList.remove("vis");
    }
  }

  // Normal klik-adfærd
  valgtIdx = i;
  renderGrid();
  const panel = document.getElementById("detail-panel");
  panel.classList.add("aktiv");
  panel.innerHTML = `
    <div class="detail-top">
      <div class="detail-ikon">${dag.vejr.ikon}</div>
      <div>
        <div class="detail-titel">${dag.vejr.label}</div>
        <div class="detail-temp">${dag.navn} · ${dag.temp}°C</div>
      </div>
    </div>
    <p class="detail-tekst">${dag.vejr.beskrivelse}</p>
    <div class="badge-row">${dag.vejr.badges.map(b => `<span class="badge">${b}</span>`).join("")}</div>
    <button class="luk-btn" onclick="lukPanel()">✕ Luk</button>
  `;
  panel.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

let fundneAch = JSON.parse(localStorage.getItem("lv_ach_set") || "[]");
let achAntal = fundneAch.length;

function opdaterTæller(animate) {
  const el = document.getElementById("ach-antal");
  const badge = document.getElementById("ach-tæller");
  el.textContent = achAntal;
  if (achAntal === 0) { badge.style.opacity = "0.4"; return; }
  badge.style.opacity = "1";
  if (animate) {
    badge.classList.remove("ny");
    void badge.offsetWidth;
    badge.classList.add("ny");
  }
}

function visAchievement() {
  const fundIkon = dagData[spilValgte[0]].vejr.ikon;
  const pulje = ikonAchievements[fundIkon] || generelleAchievements;

  // Find achievements i puljen som ikke er fundet endnu
  const ulaaste = pulje.filter(a => !fundneAch.includes(a.titel));
  const nyFund = ulaaste.length > 0;
  const a = nyFund
    ? ulaaste[Math.floor(Math.random() * ulaaste.length)]
    : pulje[Math.floor(Math.random() * pulje.length)];

  if (nyFund) {
    fundneAch.push(a.titel);
    localStorage.setItem("lv_ach_set", JSON.stringify(fundneAch));
    achAntal = fundneAch.length;
    opdaterTæller(false);
  }

  document.getElementById("ach-ikon").textContent = a.ikon;
  document.getElementById("ach-titel").textContent = a.titel;
  const ekstra = nyFund
    ? " (" + achAntal + ". fund 🏅)"
    : " (allerede fundet – du er god!)";
  document.getElementById("ach-tekst").textContent = a.tekst + ekstra;
  document.getElementById("achievement").classList.add("vis");

  if (nyFund && achAntal === 40) {
    // Episk kanon + auto-reset efter delay
    startKonfetti('episk');
    setTimeout(() => {
      fundneAch = [];
      achAntal = 0;
      localStorage.removeItem("lv_ach_set");
      opdaterTæller(false);
    }, 8000);
  } else if (nyFund && achAntal % 5 === 0) {
    startKonfetti('milestone');
  } else {
    startKonfetti('normal');
  }
}

function lukAchievement() {
  document.getElementById("achievement").classList.remove("vis");
  stopKonfetti();
  opdaterTæller(true);
  spilValgte = [];
  renderGrid();
}

function lukPanel() {
  document.getElementById("detail-panel").classList.remove("aktiv");
  valgtIdx = null;
  renderGrid();
}

// --- Konfetti ---
const canvas = document.getElementById("konfetti-canvas");
const ctx = canvas.getContext("2d");
let konfettiParter = [];
let animId = null;

function startKonfetti(niveau) {
  // niveau: 'normal' | 'milestone' | 'episk'
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stopKonfetti();

  const antal = niveau === 'episk' ? 600 : niveau === 'milestone' ? 260 : 120;
  const farver = niveau === 'episk'
    ? ["#F5A623","#5BA8E0","#4A9B6F","#E05BA8","#A8E05B","#5BE0C8","#FF4444","#FFD700","#FF69B4","#00CED1","#FF6347","#7B68EE"]
    : ["#F5A623","#5BA8E0","#4A9B6F","#E05BA8","#A8E05B","#5BE0C8"];

  function lavPartikel(forsinket) {
    return {
      x: Math.random() * canvas.width,
      y: forsinket ? -rand(0, canvas.height * (niveau === 'episk' ? 3 : 1.5)) : Math.random() * -200,
      w: rand(niveau === 'episk' ? 8 : 6, niveau === 'episk' ? 18 : 14),
      h: rand(niveau === 'episk' ? 10 : 8, niveau === 'episk' ? 22 : 18),
      farve: farver[rand(0, farver.length-1)],
      rot: Math.random() * Math.PI * 2,
      rotFart: (Math.random()-0.5) * (niveau === 'episk' ? 0.25 : 0.15),
      fartY: rand(niveau === 'episk' ? 3 : 2, niveau === 'episk' ? 8 : 5),
      fartX: (Math.random()-0.5) * (niveau === 'episk' ? 4 : 2),
      form: niveau === 'episk' ? rand(0,2) : 0  // 0=firkant, 1=cirkel, 2=stjerne
    };
  }

  konfettiParter = Array.from({length: antal}, (_, i) => lavPartikel(true));

  function tegnStjerne(ctx, cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const b = a + 2 * Math.PI / 5;
      ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
      ctx.lineTo(cx + Math.cos(b)*r*0.4, cy + Math.sin(b)*r*0.4);
    }
    ctx.closePath();
    ctx.fill();
  }

  function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    konfettiParter.forEach(p => {
      p.y += p.fartY; p.x += p.fartX; p.rot += p.rotFart;
      ctx.save();
      ctx.translate(p.x + p.w/2, p.y + p.h/2);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.farve;
      if (p.form === 1) {
        ctx.beginPath(); ctx.arc(0, 0, p.w/2, 0, Math.PI*2); ctx.fill();
      } else if (p.form === 2) {
        tegnStjerne(ctx, 0, 0, p.w/2);
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();
    });
    konfettiParter = konfettiParter.filter(p => p.y < canvas.height + 40);
    if (konfettiParter.length > 0) animId = requestAnimationFrame(loop);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animId = requestAnimationFrame(loop);
}

function stopKonfetti() {
  if (animId) cancelAnimationFrame(animId);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

let fdfKliks = 0;
let fdfResetTimer = null;
let fdfKlikTimer = null;
function fdfKlik() {
  clearTimeout(fdfKlikTimer);
  fdfKliks++;
  if (fdfKliks >= 3) {
    fdfKliks = 0;
    document.getElementById("fdf-reset").classList.add("aktiveret");
    const confirm = document.getElementById("reset-confirm");
    confirm.classList.add("vis");
    clearTimeout(fdfResetTimer);
    fdfResetTimer = setTimeout(() => {
      confirm.classList.remove("vis");
      document.getElementById("fdf-reset").classList.remove("aktiveret");
    }, 4000);
  } else {
    fdfKlikTimer = setTimeout(() => { fdfKliks = 0; }, 1500);
  }
}
function resetAchievements() {
  fundneAch = [];
  achAntal = 0;
  localStorage.removeItem("lv_ach_set");
  opdaterTæller(false);
  document.getElementById("reset-confirm").classList.remove("vis");
  document.getElementById("fdf-reset").classList.remove("aktiveret");
}

genererVejr();
opdaterTæller(false);
</script>
